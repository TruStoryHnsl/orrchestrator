<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>orrchestrator — terminal</title>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="terminal-body">
<div id="terminal"></div>
<div id="debug" style="position:fixed;bottom:0;left:0;font:10px monospace;color:#888;background:#000;padding:2px 6px;pointer-events:none;z-index:999"></div>
<script>
const debug = document.getElementById('debug');
function log(msg) {
  debug.textContent = msg;
  console.log('[term]', msg);
}

const term = new Terminal({
  cursorBlink: true,
  theme: { background: '#050d18', foreground: '#8fbfff', cursor: '#4af' },
  convertEol: false,
});
const fit = new FitAddon.FitAddon();
term.loadAddon(fit);
term.open(document.getElementById('terminal'));
fit.fit();

const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const wsUrl = proto + '://' + location.host + '/pty';
log('connecting ' + wsUrl);
const ws = new WebSocket(wsUrl);
ws.binaryType = 'arraybuffer';

let bytesReceived = 0;
let framesReceived = 0;

ws.onopen = function() {
  log('ws open — waiting for TUI frames...');
};

ws.onmessage = function(e) {
  framesReceived++;
  if (e.data instanceof ArrayBuffer) {
    const u8 = new Uint8Array(e.data);
    bytesReceived += u8.length;
    term.write(u8);
    if (framesReceived % 100 === 1) {
      log('frames=' + framesReceived + ' bytes=' + bytesReceived);
    }
  } else if (e.data instanceof Blob) {
    // Some browsers default to Blob even with binaryType=arraybuffer
    e.data.arrayBuffer().then(function(buf) {
      const u8 = new Uint8Array(buf);
      bytesReceived += u8.length;
      term.write(u8);
    });
  } else if (typeof e.data === 'string') {
    // String fallback — just write the string
    bytesReceived += e.data.length;
    term.write(e.data);
  } else {
    log('unknown data type: ' + Object.prototype.toString.call(e.data));
  }
};

ws.onerror = function(e) {
  log('ws ERROR');
  console.error(e);
};

ws.onclose = function(e) {
  log('ws closed code=' + e.code + ' reason=' + (e.reason || '(none)'));
  term.write('\r\n\x1b[31m[disconnected]\x1b[0m\r\n');
};

// Forward keystrokes back to the server as binary (Uint8Array from TextEncoder).
term.onData(function(data) {
  if (ws.readyState === WebSocket.OPEN) ws.send(new TextEncoder().encode(data));
});

window.addEventListener('resize', function() { fit.fit(); });
</script>
</body>
</html>
