<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>orrchestrator</title>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; max-width: 100%;
  height: 100%; background: #050d18; color: #8fbfff;
  font-family: monospace; overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
  overflow: hidden;
}
body { display: flex; flex-direction: column; height: 100dvh; }

/* ── Top indicator bar ───────────────────────────────────────────── */
#topbar {
  flex: 0 0 auto;
  display: flex; align-items: center; justify-content: center;
  gap: 12px; padding: 6px 8px;
  background: rgba(5,13,24,0.95);
  border-bottom: 1px solid rgba(26,58,90,0.5);
  height: 30px;
  user-select: none; -webkit-user-select: none;
}
#topbar .label {
  color: #556; font-size: 11px;
}
#topbar .dots { display: flex; gap: 8px; }
#topbar .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(26,58,90,0.6);
  border: 1px solid rgba(42,90,138,0.6);
  cursor: pointer;
}
#topbar .dot.active {
  background: #4af; border-color: #8fbfff;
}
#topbar .nav-btn {
  background: rgba(15,42,58,0.9);
  border: 1px solid rgba(26,74,106,0.7);
  border-radius: 4px;
  color: #8fbfff;
  font: 11px monospace;
  padding: 3px 10px;
  cursor: pointer;
}
#topbar .nav-btn:active { background: rgba(30,60,90,0.95); }

/* ── Two-page horizontal swipe container ────────────────────────── */
#swipe {
  flex: 1 1 auto;
  display: flex; flex-direction: row;
  overflow-x: auto; overflow-y: hidden;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  scrollbar-width: none;
}
#swipe::-webkit-scrollbar { display: none; }

.panel {
  flex: 0 0 100vw; width: 100vw; height: 100%;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;
  overflow: hidden;
}
.panel-body { width: 100%; height: 100%; position: relative; }
.panel-body > .term {
  position: absolute; top: 0; left: 0;
  transform-origin: top left;
}

/* ── Gamepad (shared between both pages — always visible) ────────── */
.pad {
  display: block;
  flex: 0 0 auto; width: 100%;
  background: rgba(5,13,24,0.95);
  border-top: 1px solid rgba(26,58,90,0.5);
  padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
  user-select: none; -webkit-user-select: none;
}
.pad .hints { display: flex; gap: 4px; margin-bottom: 6px; }
.pad .hint {
  flex: 1 1 0; min-width: 0;
  background: rgba(15,42,58,0.9); border: 1px solid rgba(26,74,106,0.7);
  border-radius: 4px; color: #8fbfff; font: 11px monospace;
  text-align: center; padding: 8px 2px;
}
.pad .hint:active { background: rgba(30,60,90,0.95); }
.pad .row { display: flex; gap: 8px; align-items: flex-end; width: 100%; }
.pad .actions { display: flex; flex-direction: column; gap: 5px; width: 90px; flex-shrink: 0; }
.pad .actions-top { display: flex; gap: 5px; }
.pad .btn { flex: 1; border-radius: 5px; font: 12px monospace; text-align: center; padding: 10px 2px; border: 1px solid; }
.pad .btn:active { filter: brightness(1.3); }
.btn-tab   { background: rgba(26,58,42,0.9); border-color: rgba(42,106,74,0.8); color: #4a9; }
.btn-esc   { background: rgba(42,26,26,0.9); border-color: rgba(90,42,42,0.8); color: #c75; }
.btn-enter { background: rgba(20,50,90,0.95); border-color: rgba(42,106,154,0.8); color: #8fbfff; font-weight: bold; padding: 14px 2px; }
.pad .spacer { flex: 1 1 auto; }
.pad .dpad { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 4px; width: 110px; height: 110px; flex-shrink: 0; }
.pad .dbtn { background: rgba(26,58,90,0.9); border: 1px solid rgba(42,90,138,0.8); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #8fbfff; font-size: 20px; }
.pad .dbtn:active { background: rgba(40,80,120,0.95); }
.pad .dbtn-blank { background: transparent; border-color: transparent; }

@media (max-width: 360px) {
  .pad .dpad { width: 96px; height: 96px; }
  .pad .actions { width: 80px; }
}
.xterm-viewport { background: #050d18 !important; }
</style>
</head>
<body>

<div id="topbar">
  <button class="nav-btn" id="prev-page" aria-label="previous page">&#8592;</button>
  <span class="label" id="page-label">orrchestrator</span>
  <div class="dots">
    <div class="dot active" data-page="0" title="orrchestrator TUI"></div>
    <div class="dot" data-page="1" title="shell"></div>
  </div>
  <button class="nav-btn" id="next-page" aria-label="next page">&#8594;</button>
</div>

<div id="swipe">
  <section class="panel" id="panel-mirror" data-page="0" aria-label="orrchestrator TUI mirror">
    <div class="panel-body">
      <div class="term" id="terminal"></div>
    </div>
  </section>
  <section class="panel" id="panel-shell" data-page="1" aria-label="shell">
    <div class="panel-body">
      <div class="term" id="shell-terminal"></div>
    </div>
  </section>
</div>

<div class="pad" id="pad">
  <div class="hints">
    <div class="hint" data-key="n">n new</div>
    <div class="hint" data-key="s">submit</div>
    <div class="hint" data-key="r">rename</div>
    <div class="hint" data-key="a">actions</div>
  </div>
  <div class="row">
    <div class="actions">
      <div class="actions-top">
        <div class="btn btn-tab" data-key="Tab">Tab</div>
        <div class="btn btn-esc" data-key="Escape">Esc</div>
      </div>
      <div class="btn btn-enter" data-key="Enter">Enter</div>
    </div>
    <div class="spacer"></div>
    <div class="dpad">
      <div class="dbtn dbtn-blank"></div>
      <div class="dbtn" data-key="ArrowUp">↑</div>
      <div class="dbtn dbtn-blank"></div>
      <div class="dbtn" data-key="ArrowLeft">←</div>
      <div class="dbtn dbtn-blank"></div>
      <div class="dbtn" data-key="ArrowRight">→</div>
      <div class="dbtn dbtn-blank"></div>
      <div class="dbtn" data-key="ArrowDown">↓</div>
      <div class="dbtn dbtn-blank"></div>
    </div>
  </div>
</div>

<script src="/static/js/shell.js"></script>
<script>
// ── Mirror page (existing /pty + xterm logic) ─────────────────────
var term = null;

function openMirrorTerminal(cols, rows) {
  term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    cols: cols, rows: rows,
    theme: { background: '#050d18', foreground: '#8fbfff', cursor: '#4af' },
    scrollback: 0
  });
  term.open(document.getElementById('terminal'));
  setTimeout(rescaleMirror, 50);
  openMirrorWS();
  openStateWS();
}

function openStateWS() {
  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  var sws = new WebSocket(proto + '://' + location.host + '/state');
  sws.onmessage = function(e) {
    try {
      var s = JSON.parse(e.data);
      if (!term) return;
      var c = s.term_cols | 0, r = s.term_rows | 0;
      if (c > 0 && r > 0 && (c !== term.cols || r !== term.rows)) {
        term.resize(c, r);
        setTimeout(rescaleMirror, 10);
      }
    } catch (_) {}
  };
  sws.onclose = function() { setTimeout(openStateWS, 2000); };
  sws.onerror = function() { try { sws.close(); } catch (_) {} };
}

fetch('/size').then(function(r) { return r.json(); }).then(function(s) {
  var cols = s.cols && s.cols > 0 ? s.cols : 80;
  var rows = s.rows && s.rows > 0 ? s.rows : 24;
  openMirrorTerminal(cols, rows);
}).catch(function() { openMirrorTerminal(120, 40); });

function rescaleMirror() {
  var wrap = document.querySelector('#panel-mirror .panel-body');
  var el = document.getElementById('terminal');
  if (!wrap || !el) return;
  el.style.transform = 'none';
  var natW = el.offsetWidth || 1;
  var natH = el.offsetHeight || 1;
  var availW = wrap.clientWidth;
  var availH = wrap.clientHeight;
  var sx = availW / natW;
  var sy = availH / natH;
  var scale = Math.min(sx, sy, 1);
  el.style.transform = 'scale(' + scale + ')';
}

var mirrorWs = null;
function openMirrorWS() {
  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  mirrorWs = new WebSocket(proto + '://' + location.host + '/pty');
  mirrorWs.binaryType = 'arraybuffer';
  mirrorWs.onmessage = function(e) {
    if (e.data instanceof ArrayBuffer) {
      term.write(new Uint8Array(e.data));
    } else if (e.data instanceof Blob) {
      e.data.arrayBuffer().then(function(buf) { term.write(new Uint8Array(buf)); });
    } else if (typeof e.data === 'string') {
      term.write(e.data);
    }
  };
  mirrorWs.onclose = function() { if (term) term.write('\r\n\x1b[31m[disconnected]\x1b[0m\r\n'); };
  mirrorWs.onerror = function() { try { mirrorWs.close(); } catch (_) {} };
  term.onData(function(d) {
    if (mirrorWs.readyState === WebSocket.OPEN) {
      mirrorWs.send(new TextEncoder().encode(d));
    }
  });
}

function sendMirrorKey(key) {
  if (!mirrorWs || mirrorWs.readyState !== WebSocket.OPEN) return;
  var seq = {
    Enter: '\r', Tab: '\t', Escape: '\x1b', Backspace: '\x7f',
    ArrowUp: '\x1b[A', ArrowDown: '\x1b[B',
    ArrowRight: '\x1b[C', ArrowLeft: '\x1b[D'
  }[key] || key;
  mirrorWs.send(new TextEncoder().encode(seq));
}

// ── Shell page (independent tmux session) ─────────────────────────
Shell.init({ container: document.getElementById('shell-terminal') });

// ── Swipe / pagination ────────────────────────────────────────────
var swipe = document.getElementById('swipe');
var dots = document.querySelectorAll('#topbar .dot');
var pageLabel = document.getElementById('page-label');
var pageLabels = ['orrchestrator', 'shell'];
var activePage = 0;

function setActivePage(idx) {
  activePage = idx;
  dots.forEach(function(d, i) {
    d.classList.toggle('active', i === idx);
  });
  if (pageLabel) pageLabel.textContent = pageLabels[idx] || '';
  // Focus the relevant terminal so keyboard input lands there.
  if (idx === 0) {
    if (term) try { term.focus(); } catch (_) {}
  } else if (idx === 1) {
    Shell.focus();
  }
}

function scrollToPage(idx) {
  if (!swipe) return;
  var w = swipe.clientWidth;
  swipe.scrollTo({ left: idx * w, behavior: 'smooth' });
  setActivePage(idx);
}

if (swipe) {
  swipe.addEventListener('scroll', function() {
    var w = swipe.clientWidth || 1;
    var idx = Math.round(swipe.scrollLeft / w);
    if (idx !== activePage) setActivePage(idx);
  }, { passive: true });
}

dots.forEach(function(d, i) {
  d.addEventListener('click', function() { scrollToPage(i); });
});

document.getElementById('prev-page').addEventListener('click', function() {
  scrollToPage(Math.max(0, activePage - 1));
});
document.getElementById('next-page').addEventListener('click', function() {
  scrollToPage(Math.min(1, activePage + 1));
});

// Keyboard nav: PageUp/PageDown and Alt+Left/Alt+Right move pages.
// We deliberately do NOT capture bare Arrow keys — they belong to xterm.
document.addEventListener('keydown', function(e) {
  if (e.key === 'PageDown' || (e.altKey && e.key === 'ArrowRight')) {
    e.preventDefault();
    scrollToPage(Math.min(1, activePage + 1));
  } else if (e.key === 'PageUp' || (e.altKey && e.key === 'ArrowLeft')) {
    e.preventDefault();
    scrollToPage(Math.max(0, activePage - 1));
  }
});

// ── Mobile gamepad → currently active panel ───────────────────────
function dispatchKey(key) {
  if (activePage === 0) sendMirrorKey(key);
  else if (activePage === 1) Shell.sendKey(key);
}

var holds = {};
function attachHold(el, key) {
  function press() { dispatchKey(key); }
  function start(e) { e && e.preventDefault(); press(); holds[key] = setTimeout(function() { holds[key] = setInterval(press, 80); }, 150); }
  function end(e)   { e && e.preventDefault(); clearTimeout(holds[key]); clearInterval(holds[key]); }
  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchend',   end,   { passive: false });
  el.addEventListener('touchcancel', end,  { passive: false });
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup',   end);
  el.addEventListener('mouseleave', end);
}
document.querySelectorAll('[data-key]').forEach(function(el) {
  attachHold(el, el.getAttribute('data-key'));
});

// ── Resize handling ───────────────────────────────────────────────
window.addEventListener('resize', function() {
  rescaleMirror();
  Shell.rescale();
  // Re-snap after resize so the active page stays in view.
  scrollToPage(activePage);
});
window.addEventListener('orientationchange', function() {
  setTimeout(function() {
    rescaleMirror();
    Shell.rescale();
    scrollToPage(activePage);
  }, 200);
});

// Default page: 0 (orrchestrator mirror).
setActivePage(0);
</script>

</body>
</html>
