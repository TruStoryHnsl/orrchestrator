<!-- Diagnostic: BIG red bar at the top. Tap to scan for overflow. -->
<div id="diag-badge" style="position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;font:bold 13px monospace;padding:8px 10px;text-align:center;z-index:99999;cursor:pointer">
  TAP HERE TO SCAN FOR OVERFLOW — V3
</div>
<script>
(function() {
  var badge = document.getElementById('diag-badge');
  function scan() {
    var vw = window.innerWidth;
    var dw = document.documentElement.scrollWidth;
    var bw = document.body.scrollWidth;
    var offenders = [];
    document.querySelectorAll('*').forEach(function(el) {
      var r = el.getBoundingClientRect();
      if (r.width > vw + 1 || r.right > vw + 1) {
        offenders.push({
          tag: el.tagName,
          cls: (el.className || '').toString().slice(0, 40),
          id: el.id,
          w: Math.round(r.width),
          left: Math.round(r.left),
          right: Math.round(r.right)
        });
      }
    });
    return { vw: vw, docW: dw, bodyW: bw, offenders: offenders };
  }
  badge.addEventListener('click', function() {
    var r = scan();
    var msg = 'viewport=' + r.vw + 'px  docW=' + r.docW + '  bodyW=' + r.bodyW + '\n\n';
    msg += r.offenders.length + ' elements overflowing:\n\n';
    msg += r.offenders.slice(0, 8).map(function(o) {
      var sel = '<' + o.tag.toLowerCase() + (o.id ? '#' + o.id : '') + (o.cls ? '.' + o.cls.split(' ')[0] : '') + '>';
      return 'left=' + o.left + ' right=' + o.right + ' w=' + o.w + ' ' + sel;
    }).join('\n');
    alert(msg);
  });
})();
</script>
