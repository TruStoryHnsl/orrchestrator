<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>orrchestrator</title>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="ui-body">
<nav class="top-nav" id="top-nav"></nav>
<main id="main-panel">
  <div id="panel-design" class="panel active"></div>
  <div id="panel-oversee" class="panel"></div>
  <div id="panel-hypervise" class="panel"></div>
  <div id="panel-analyze" class="panel"></div>
</main>
<div id="status-bar" class="status-bar">
  <span id="status-left"></span>
  <span id="status-right">
    <a href="/terminal" style="color:#4a9; text-decoration: none; margin-right: 8px;">terminal ⇗</a>
  </span>
</div>
<div id="mobile-pad" class="mobile-pad"></div>

<script src="/static/js/ws.js"></script>
<script src="/static/js/layout.js"></script>
<script src="/static/js/intentions.js"></script>
<script src="/static/js/sessions.js"></script>
<script src="/static/js/mobile.js"></script>
<script>
WS.connect();
Layout.init();
Mobile.init();

// Overflow diagnostic — tap the badge to see which elements are wider
// than the viewport. Tap-hold 1s to toggle red outlines on offenders.
(function() {
  var badge = document.createElement('div');
  badge.style.cssText = 'position:fixed;top:4px;right:4px;background:#a30;color:#fff;font:11px monospace;padding:3px 6px;border-radius:3px;z-index:99999;opacity:0.85';
  badge.textContent = 'scan';
  document.body.appendChild(badge);

  function scan() {
    var vw = window.innerWidth;
    var offenders = [];
    document.querySelectorAll('*').forEach(function(el) {
      var w = el.getBoundingClientRect().width;
      if (w > vw + 1) offenders.push({ tag: el.tagName, cls: el.className, id: el.id, w: Math.round(w) });
    });
    return { vw: vw, offenders: offenders };
  }

  badge.addEventListener('click', function() {
    var r = scan();
    badge.textContent = r.offenders.length + ' > vw ' + r.vw;
    if (r.offenders.length) {
      var lines = r.offenders.slice(0, 5).map(function(o) {
        return o.w + 'px: <' + o.tag.toLowerCase() + (o.id ? '#' + o.id : '') + (o.cls ? '.' + String(o.cls).split(' ')[0] : '') + '>';
      });
      alert('viewport=' + r.vw + 'px, ' + r.offenders.length + ' overflowing:\n\n' + lines.join('\n'));
    } else {
      alert('no overflowing elements');
    }
  });
})();
</script>
</body>
</html>
