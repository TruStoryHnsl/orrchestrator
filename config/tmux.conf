# orrchestrator tmux defaults
# Load with: tmux source-file ~/projects/orrchestrator/config/tmux.conf
# Do NOT copy this to ~/.tmux.conf — use it only for orrch sessions.

# Mouse support (scroll, click to select pane/window)
set -g mouse on

# Large scrollback
set -g history-limit 50000

# Truecolor
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Status bar
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour250"
set -g status-left " [orrch: #S] "
set -g status-left-length 30
set -g status-right " %H:%M "
set -g status-right-length 15
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=colour81,bold"

# Window titles
set -g set-titles on
set -g set-titles-string "#S / #W"

# Start window/pane index at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Reduce escape-time for nvim
set -sg escape-time 10

# Focus events (needed for nvim autoread)
set -g focus-events on
